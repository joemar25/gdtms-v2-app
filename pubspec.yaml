name: fsi_courier_app
description: "FSI courier's application for deliveries."
publish_to: 'none'

# ─── Versioning ───────────────────────────────────────────────────────────────
# Format : <major>.<minor>.<patch>+<build>
#
#   major — breaking change or full redesign          e.g. 2.0.0+N
#   minor — new feature, backward-compatible          e.g. 1.1.0+N
#   patch — bug fix or small improvement              e.g. 1.0.4+N
#   build — store submission counter, never reset     e.g. 1.0.3+2
#
# The part before '+' (1.0.3) is the user-visible version shown in the app UI
# via AppVersionService.version (reads pubspec at runtime via PackageInfo).
#
# The part after '+' (the build number) is what the Play Store / App Store use
# internally. It must be incremented on every store upload — two builds with the
# same display version but different build numbers are valid (e.g. hotfixes).
# The store will reject an upload if the build number is not higher than the
# previous submission.
#
# This is the ONLY place to update the version — no dart-define, no config.dart.
# ──────────────────────────────────────────────────────────────────────────────
version: 1.0.9+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  easy_localization: ^3.0.7
  dio: ^5.8.0+1
  http_parser: ^4.0.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.3
  go_router: ^17.1.0
  flutter_riverpod: ^3.3.1
  lucide_icons: ^0.257.0
  moon_design: ^1.1.0
  path_provider: ^2.1.5
  device_info_plus: ^12.4.0
  permission_handler: ^12.0.1
  mobile_scanner: ^7.0.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  uuid: ^4.5.3
  intl: ^0.20.2
  url_launcher: ^6.3.1
  flutter_local_notifications: ^21.0.0
  flutter_image_compress: ^2.4.0
  geolocator: ^14.0.2
  signature: ^6.3.0
  connectivity_plus: ^7.1.0
  sqflite: ^2.4.1
  path: ^1.9.0
  cupertino_icons: ^1.0.8
  crypto: ^3.0.7
  retry: ^3.1.2
  workmanager: ^0.9.0+3
  sentry_flutter: ^8.14.0
  package_info_plus: ^9.0.0
  in_app_review: ^2.0.10
  flutter_animate: ^4.5.2
  firebase_core: ^4.7.0
  flutter_spinkit: ^5.2.1
  firebase_messaging: ^16.2.0
  screen_protector: ^1.5.1
  open_filex: ^4.3.4
  flutter_native_splash: ^2.4.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.5
  build_runner: ^2.4.15
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/legal/
    - assets/translations/

# flutter pub run flutter_launcher_icons:main
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#020617"
  image: "assets/images/splash_logo.png"
  android: true
  ios: true
  fullscreen: true
  android_12:
    image: "assets/images/splash_logo.png"
    color: "#FFFFFF"
    dark_color: "#020617"
